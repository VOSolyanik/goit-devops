image:
  repository: "451790114144.dkr.ecr.us-east-1.amazonaws.com/lesson-8-9-ecr"
  tag: latest
  pullPolicy: IfNotPresent

# Initial replica count — must match autoscaling.minReplicas when HPA is enabled
replicaCount: 2

# Service: external access via AWS NLB/ELB
service:
  type: LoadBalancer
  port: 8000

ingress:
  enabled: false

# Resource requests/limits for the Django container
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 256Mi

# HPA: scale 2-6 pods at CPU > 70%
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70

# ConfigMap: env vars from lesson-4 (.env)
config:
  DJANGO_SECRET_KEY: "insecure-dev-key"
  DJANGO_DEBUG: "0"
  DJANGO_ALLOWED_HOSTS: "*"
  POSTGRES_HOST: db
  POSTGRES_PORT: "5432"
  POSTGRES_USER: django_user
  POSTGRES_DB: django_db
  POSTGRES_PASSWORD: pass9764gd

# PostgreSQL — official postgres:17 image (no Bitnami subchart)
postgresql:
  enabled: false

postgres:
  image: postgres:17-alpine
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 384Mi
